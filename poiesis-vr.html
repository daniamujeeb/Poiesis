<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poiesis VR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #04070f; font-family: sans-serif; }
        /* Hidden input to capture keyboard events in VR/Desktop */
        #vr-input-proxy {
            position: absolute; opacity: 0; pointer-events: none; z-index: -1;
        }
    </style>
</head>
<body>

<input type="text" id="vr-input-proxy" autofocus>

<a-scene 
    id="main-scene"
    background="color: #04070f"
    fog="type: exponential; color: #060a14; density: 0.022"
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true">

    <a-light type="ambient" color="#0a1628" intensity="1.2"></a-light>
    <a-light type="point" color="#1a4aaa" intensity="2.5" position="0 3 -6" distance="18"></a-light>
    
    <a-sphere position="-4 2 -12" radius="4.5" color="#0a1e50" opacity="0.18"
        animation="property:position; to:-4 2.8 -12; loop:true; dur:12000; dir:alternate; easing:easeInOutSine"></a-sphere>
    
    <a-torus position="0 1.2 -9" radius="3.8" radius-tubular="0.014" color="#0a2860" opacity="0.5"
        animation="property:rotation; to:0 360 20; loop:true; dur:70000; easing:linear"></a-torus>

    <a-entity id="rig" position="0 0 0">
        <a-camera look-controls="enabled:true" wasd-controls="enabled:false">
            
            <a-entity cursor="fuse: true; fuseTimeout: 1500"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #4a9eff; shader: flat; opacity: 0.6"
                      raycaster="objects: .raycastable">
                <a-animation begin="fusing" easing="ease-in" attribute="scale" fill="forwards" from="1 1 1" to="0.1 0.1 0.1" dur="1500"></a-animation>
                <a-animation begin="click" attribute="scale" to="1 1 1" dur="150"></a-animation>
                <a-animation begin="mouseleave" attribute="scale" to="1 1 1" dur="500"></a-animation>
            </a-entity>

            <a-entity id="hud-container" position="0 0 -2">
                
                <a-entity id="ui-intro" visible="true">
                    <a-text value="Poiesis" align="center" position="0 0.4 0" scale="2.5 2.5 2.5" color="#e8f0ff" font="mozillavr"></a-text>
                    <a-text value="the act of bringing something into being" align="center" position="0 0.1 0" scale="0.6 0.6 0.6" color="#4a9eff"></a-text>
                    <a-text value="What if you could meet yourself without your name?" align="center" position="0 -0.2 0" scale="0.4 0.4 0.4" color="#e8f0ff" opacity="0.6"></a-text>
                    
                    <a-entity id="start-btn" class="raycastable" geometry="primitive: plane; width: 0.6; height: 0.2" 
                              material="color: #1a4a8a; opacity: 0.5; transparent: true" position="0 -0.6 0"
                              onclick="beginVR()">
                        <a-text value="BEGIN" align="center" scale="0.6 0.6 0.6" color="#4a9eff"></a-text>
                    </a-entity>
                </a-entity>

                <a-entity id="ui-questions" visible="false">
                    <a-text id="vr-q-counter" value="01 / 04" position="-0.8 0.6 0" scale="0.3 0.3 0.3" color="#4a9eff"></a-text>
                    <a-text id="vr-q-text" value="Introduce yourself - without your name?" align="center" position="0 0.2 0" width="2.5" wrap-count="30" color="#e8f0ff"></a-text>
                    
                    <a-entity geometry="primitive: plane; width: 1.8; height: 0.3" material="color: #000; opacity: 0.4" position="0 -0.2 0">
                        <a-text id="vr-input-display" value="Click to type..." align="center" scale="0.5 0.5 0.5" color="#4a9eff"></a-text>
                    </a-entity>

                    <a-entity id="next-btn" class="raycastable" geometry="primitive: plane; width: 0.5; height: 0.15" 
                              material="color: #1a4a8a; opacity: 0.3" position="0.6 -0.6 0"
                              onclick="nextQuestionVR()">
                        <a-text value="CONTINUE" align="center" scale="0.4 0.4 0.4" color="#4a9eff"></a-text>
                    </a-entity>
                </a-entity>

                <a-entity id="ui-companion" visible="false">
                    <a-text value="POIESIS SPEAKS" position="-0.8 0.6 0" scale="0.3 0.3 0.3" color="#4a9eff"></a-text>
                    <a-text id="vr-companion-text" value="" align="left" position="-0.8 0 0" width="1.6" wrap-count="35" color="#e8f0ff"></a-text>
                    
                    <a-entity class="raycastable" geometry="primitive: plane; width: 0.7; height: 0.2" 
                              material="color: #1a4a8a; opacity: 0.4" position="0 -0.8 0"
                              onclick="location.reload()">
                        <a-text value="BEGIN AGAIN" align="center" scale="0.5 0.5 0.5" color="#4a9eff"></a-text>
                    </a-entity>
                </a-entity>

            </a-entity>
        </a-camera>
    </a-entity>
</a-scene>

<script>
    const questions = [
        "Introduce yourself - without using your name, profession, nationality, religion, ethnicity, or race.",
        "Stripped of every role the world gave you - what do you actually love?",
        "If no one needed anything from you - what would you make or become?",
        "What kind of world would you inhabit if you were truly free?"
    ];
    
    let currentQ = 0;
    let answers = [];
    const proxyInput = document.getElementById('vr-input-proxy');
    const displayInput = document.getElementById('vr-input-display');

    // Handle typing via proxy
    proxyInput.addEventListener('input', (e) => {
        displayInput.setAttribute('value', e.target.value || "Type here...");
    });

    // Handle Enter key for VR/Desktop
    proxyInput.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') nextQuestionVR();
    });

    function beginVR() {
        document.getElementById('ui-intro').setAttribute('visible', 'false');
        document.getElementById('ui-questions').setAttribute('visible', 'true');
        proxyInput.focus();
        startMusic();
    }

    function nextQuestionVR() {
        const val = proxyInput.value.trim();
        if(val.length < 2) return;

        answers.push(val);
        currentQ++;
        proxyInput.value = "";
        displayInput.setAttribute('value', "Type here...");

        if(currentQ < questions.length) {
            document.getElementById('vr-q-counter').setAttribute('value', `0${currentQ+1} / 04`);
            document.getElementById('vr-q-text').setAttribute('value', questions[currentQ]);
            proxyInput.focus();
        } else {
            generateReflectionVR();
        }
    }

    async function generateReflectionVR() {
        document.getElementById('ui-questions').setAttribute('visible', 'false');
        document.getElementById('ui-companion').setAttribute('visible', 'true');
        
        const finalResponse = "You are a seeker who moves toward resonance. To step into your Umwelt: spend time in silence with the question of what you would do if no external reward were possible. That direction is your essence.";
        
        let i = 0;
        const textEl = document.getElementById('vr-companion-text');
        const typing = setInterval(() => {
            textEl.setAttribute('value', finalResponse.substring(0, i) + "|");
            i++;
            if(i > finalResponse.length) clearInterval(typing);
        }, 40);
    }

    // TONE.JS ENGINE
    let audioStarted = false;
    async function startMusic() {
        if(audioStarted) return;
        audioStarted = true;
        await Tone.start();
        const reverb = new Tone.Reverb({ decay: 12, wet: 0.8 }).toDestination();
        const vol = new Tone.Volume(-20).connect(reverb);
        const pad = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: 'sine' },
            envelope: { attack: 6, release: 10 }
        }).connect(vol);
        
        const chords = [['C3','G3','E4'], ['A2','E3','C4'], ['F2','C3','A3']];
        let ci = 0;
        Tone.Transport.scheduleRepeat(time => {
            pad.triggerAttackRelease(chords[ci], '8n', time);
            ci = (ci + 1) % chords.length;
        }, "16n");
        Tone.Transport.start();
    }
</script>
</body>
</html>
