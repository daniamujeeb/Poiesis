<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #04070f; }
        /* Hidden input field to capture keyboard data in VR/Desktop */
        #vr-input-proxy {
            position: absolute; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

<input type="text" id="vr-input-proxy" autofocus>

<a-scene 
    id="main-scene"
    background="color: #04070f"
    fog="type: exponential; color: #060a14; density: 0.022"
    renderer="antialias: true"
>
    <a-assets>
        <a-asset-item id="serifFont" src="https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"></a-asset-item>
    </a-assets>

    <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls wasd-controls="enabled: false">
            <a-entity cursor="fuse: true; fuseTimeout: 1500"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #4a9eff; shader: flat; opacity: 0.5"
                      animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                      animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                      animation__mouseleave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 500">
            </a-entity>

            <a-entity id="hud" position="0 0 -2.5">
                
                <a-entity id="ui-intro" visible="true">
                    <a-text value="Poiesis" align="center" position="0 0.5 0" scale="2.5 2.5 2.5" font="mozillavr" color="#e8f0ff"></a-text>
                    <a-text value="the act of bringing something into being" align="center" position="0 0.1 0" scale="0.6 0.6 0.6" italic="true" color="#4a9eff"></a-text>
                    
                    <a-entity id="start-btn" geometry="primitive: plane; width: 1; height: 0.3" 
                              material="color: #1a4a8a; opacity: 0.4; transparent: true"
                              position="0 -0.6 0" class="raycastable"
                              onclick="beginVR()">
                        <a-text value="BEGIN" align="center" scale="0.8 0.8 0.8" font="monoid"></a-text>
                    </a-entity>
                </a-entity>

                <a-entity id="ui-questions" visible="false">
                    <a-text id="vr-q-counter" value="01 / 04" position="-1.2 0.8 0" scale="0.4 0.4 0.4" color="#4a9eff"></a-text>
                    <a-text id="vr-q-text" value="Who are you - without your name?" align="center" position="0 0.3 0" width="3" wrap-count="25"></a-text>
                    
                    <a-entity geometry="primitive: plane; width: 2.2; height: 0.4" material="color: #000; opacity: 0.3" position="0 -0.3 0">
                        <a-text id="vr-input-display" value="Click to type..." align="center" color="#4a9eff" scale="0.7 0.7 0.7"></a-text>
                    </a-entity>

                    <a-entity id="continue-btn" geometry="primitive: plane; width: 0.8; height: 0.25" 
                              material="color: #1a4a8a; opacity: 0.2"
                              position="0.7 -0.8 0" class="raycastable"
                              onclick="nextQuestionVR()">
                        <a-text value="CONTINUE ->" align="center" scale="0.5 0.5 0.5"></a-text>
                    </a-entity>
                </a-entity>

                <a-entity id="ui-companion" visible="false">
                    <a-text value="POIESIS SPEAKS" position="-1.2 0.8 0" scale="0.4 0.4 0.4" color="#4a9eff"></a-text>
                    <a-text id="vr-companion-text" value="" align="left" position="-1.1 0 0" width="2.2" wrap-count="35"></a-text>
                    
                    <a-entity geometry="primitive: plane; width: 1; height: 0.3" 
                              material="color: #1a4a8a; opacity: 0.4"
                              position="0 -1 0" class="raycastable"
                              onclick="restartVR()">
                        <a-text value="RESTART" align="center" scale="0.6 0.6 0.6"></a-text>
                    </a-entity>
                </a-entity>

            </a-entity>
        </a-camera>
    </a-entity>

    <a-light type="ambient" color="#0a1628" intensity="1.2"></a-light>
    <a-light type="point" color="#1a4aaa" intensity="2.5" position="0 3 -6"></a-light>
    <a-sphere position="-4 2 -12" radius="4.5" color="#0a1e50" opacity="0.18" animation="property:position; to:-4 2.8 -12; loop:true; dur:12000; dir:alternate"></a-sphere>
    <a-torus position="0 1.2 -9" radius="3.8" radius-tubular="0.014" color="#0a2860" opacity="0.5" animation="property:rotation; to:0 360 20; loop:true; dur:70000; easing:linear"></a-torus>

</a-scene>

<script>
    // Logic Bridge
    const questions = [
        "Introduce yourself - without using your name, profession, or labels.",
        "Stripped of every role - what do you actually love?",
        "If no one needed anything from you - what would you build?",
        "What world would you inhabit if you were truly free?"
    ];
    
    let currentQ = 0;
    let answers = [];
    const proxyInput = document.getElementById('vr-input-proxy');
    const displayInput = document.getElementById('vr-input-display');

    // Handle typing via the proxy input
    proxyInput.addEventListener('input', (e) => {
        displayInput.setAttribute('value', e.target.value || "Type here...");
    });

    function beginVR() {
        document.getElementById('ui-intro').setAttribute('visible', 'false');
        document.getElementById('ui-questions').setAttribute('visible', 'true');
        proxyInput.focus();
        startMusic(); // Your existing Tone.js function
    }

    function nextQuestionVR() {
        const val = proxyInput.value.trim();
        if(val.length < 2) return;

        answers.push(val);
        currentQ++;
        proxyInput.value = "";
        displayInput.setAttribute('value', "Type here...");

        if(currentQ < questions.length) {
            document.getElementById('vr-q-counter').setAttribute('value', `0${currentQ+1} / 04`);
            document.getElementById('vr-q-text').setAttribute('value', questions[currentQ]);
        } else {
            showCompanionVR();
        }
    }

    async function showCompanionVR() {
        document.getElementById('ui-questions').setAttribute('visible', 'false');
        document.getElementById('ui-companion').setAttribute('visible', 'true');
        
        const responseText = "You are a seeker of form. To transcend: dedicate time to making with no audience. Your Umwelt expands when you stop performing.";
        
        // Simple typewriter effect for VR
        let i = 0;
        const textEl = document.getElementById('vr-companion-text');
        const interval = setInterval(() => {
            textEl.setAttribute('value', responseText.substring(0, i) + "_");
            i++;
            if(i > responseText.length) clearInterval(interval);
        }, 50);
    }

    function restartVR() {
        location.reload();
    }

    // Reuse your startMusic() and matchReflection() logic here...
</script>
</body>
</html>
